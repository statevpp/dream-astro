# .github/workflows/youtube-daily.yml
# Дневна генерация на Lumaris YouTube/TikTok епизод — виж
# scripts/generate-youtube-episode.js за причината това да е GitHub Action,
# а не Vercel cron (ffmpeg + 14 TTS/image извиквания не се събират в
# Vercel-ския function timeout). ВАЖНО (открито при реален POC тест на
# 18.07.2026): за разлика от документацията, ubuntu-latest runner-ите НЕ
# идват гарантирано с preinstalled ffmpeg — първият реален run гръмна с
# "ffmpeg: command not found" (exit 127). Затова има изрична apt-get install
# стъпка по-долу, вместо да разчитаме на runner image-а.
#
# ВАЖНО #2 (открито при POC run #2 на 18.07.2026): в GitHub repo-то НЯМА
# подпапка "astro-konsultacii-v2" — това е само локалното име на папката на
# компютъра на Петър. В самия repo (и оттам в чекаутнатия runner) скриптовете
# и package.json са направо в корена. Затова стъпките по-долу НЕ ползват
# working-directory, а artifact пътят е "out/lumaris/**" (не с префикс
# "astro-konsultacii-v2/").
#
# ВАЖНО #3 (открито при POC run #3 на 18.07.2026): скриптът
# scripts/assemble-youtube-video.sh е качен в git БЕЗ executable bit
# (chmod +x), затова generate-youtube-episode.js (който го извиква директно
# през execFileSync) гърмеше с "EACCES". GitHub web editor-ът не позволява
# промяна на file mode, затова поправката е изрична chmod стъпка по-долу
# вместо fix в самия git blob. Run #3 стигна успешно през ffmpeg install,
# npm install, transits fetch, Gemini script, 14 TTS сегмента и 14 фонови
# визуала (Nano Banana 2) — падна чак на финалния ffmpeg assembly стъпка.
#
# ВАЖНО, РЪЧНА СТЪПКА ПРЕДИ ТОВА ДА ЗАРАБОТИ: добави тези secrets в
# Settings → Secrets and variables → Actions на repo-то statevpp/dream-astro
# (различни от Vercel env vars — две отделни хранилища, дори имената да
# съвпадат): GEMINI_API_KEY, ASTROLOGY_API_USER_ID, ASTROLOGY_API_KEY.
#
# Резултатът (двата .mp4 + title/thumbnail/description) се качва като build
# artifact — НЕ се публикува автоматично никъде (няма YouTube/TikTok upload
# API конектор). Изтегли артефакта от Actions таба и качи ръчно.

name: Lumaris daily YouTube episode

on:
  schedule:
    # 06:00 UTC дневно — достатъчно рано, за да остане време за ръчен преглед
    # и качване преди типичните "сутрешен хороскоп" пиково гледане часове.
    - cron: "0 6 * * *"
  workflow_dispatch: {} # позволява ръчно пускане от Actions таба (за POC теста, задача #42)

jobs:
  generate-episode:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Инсталирай ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Провери ffmpeg наличност
        run: ffmpeg -version && ffprobe -version

      - name: Инсталирай зависимости
        run: npm install --omit=dev

      - name: Направи assemble-youtube-video.sh изпълним
        run: chmod +x scripts/assemble-youtube-video.sh

      - name: Генерирай епизода
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ASTROLOGY_API_USER_ID: ${{ secrets.ASTROLOGY_API_USER_ID }}
          ASTROLOGY_API_KEY: ${{ secrets.ASTROLOGY_API_KEY }}
        run: node scripts/generate-youtube-episode.js

      - name: Качи резултата като artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumaris-episode-${{ github.run_id }}
          path: out/lumaris/**
          retention-days: 14
